<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Organizações Políticas | 11 Dimensões do Poder</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-glow: rgba(30, 58, 138, 0.2);
            --bg: #f8fafc;
            --bg-gradient: radial-gradient(circle at 20% 30%, #f1f5f9 0%, #ffffff 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-dark: #0f172a;
            --text-muted: #334155;
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 1500px;
            will-change: transform;
        }

        #cursor {
            width: 28px;
            height: 28px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
            will-change: left, top;
            background: transparent;
            backdrop-filter: blur(2px);
        }
        #cursor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.2s;
        }
        #cursor.active {
            width: 44px;
            height: 44px;
            border-color: var(--primary-light);
            background: rgba(59, 130, 246, 0.08);
        }
        #cursor.active::before {
            background: var(--primary-light);
            box-shadow: 0 0 8px var(--primary-light);
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .orb-master {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
            transition: background 0.4s ease;
            will-change: left, top;
        }

        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            width: 90%;
            max-width: 1300px;
            height: 700px;
            position: relative;
            transition: transform 0.08s linear;
            will-change: transform;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-400px) rotateY(25deg) scale(0.95);
            transition: opacity 0.6s var(--ease-smooth), visibility 0.6s, transform 0.7s var(--ease-bounce);
            filter: blur(6px);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateY(0deg) scale(1);
            filter: blur(0);
        }

        .info-panel {
            padding: 2rem;
            animation: panelReveal 0.7s var(--ease-bounce);
        }

        @keyframes panelReveal {
            0% { opacity: 0; transform: translateX(-60px) rotateY(-15deg); }
            100% { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 18px;
            background: rgba(30, 58, 138, 0.08);
            border: 1px solid rgba(30, 58, 138, 0.2);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1.8rem;
            backdrop-filter: blur(2px);
            animation: badgePulse 2s infinite ease-in-out;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(30, 58, 138, 0); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 1.8rem;
            transition: all 0.4s var(--ease-elastic);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.05);
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 0.6;
        }

        .glass-card:hover {
            transform: translateY(-6px) translateZ(20px) scale(1.01);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-light);
        }

        .card-content {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
        }
        .card-content::-webkit-scrollbar { width: 3px; }
        .card-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
        .card-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .timeline-list, .compare-list {
            list-style: none;
            padding-left: 0;
        }
        .timeline-list li, .compare-list li {
            margin-bottom: 0.9rem;
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
        }
        .timeline-list i, .compare-list i {
            width: 26px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .regime-compare {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        .regime-card {
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 0.9rem;
            border-left: 4px solid;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .regime-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .regime-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .regime-card p { font-size: 0.85rem; margin-bottom: 0.2rem; }
        .regime-card small { font-size: 0.75rem; color: var(--primary); }

        .hero-wrap {
            position: relative;
            height: 100%;
            display: grid;
            place-items: center;
            perspective: 600px;
        }

        .hero-visual {
            font-size: 11rem;
            color: var(--primary);
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
            animation: gentleFloat 4s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .hero-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1.5px dashed var(--primary-light);
            border-radius: 50%;
            opacity: 0.2;
            animation: spin 20s linear infinite;
        }
        .hero-ring-2 {
            position: absolute;
            width: 420px;
            height: 420px;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%;
            animation: spinReverse 25s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .nav-ui {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 8px 28px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 50px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: navFade 0.5s ease;
        }

        @keyframes navFade {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.6rem;
            cursor: pointer;
            transition: transform 0.2s var(--ease-bounce);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { transform: scale(1.2); color: var(--primary-light); text-shadow: 0 0 8px rgba(59,130,246,0.3); }

        .slide-counter {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 3px;
            animation: counterGlow 1.5s infinite alternate;
        }

        @keyframes counterGlow {
            from { text-shadow: 0 0 0px rgba(30,58,138,0); }
            to { text-shadow: 0 0 6px rgba(30,58,138,0.3); }
        }

        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2000;
        }

        .slide.active .info-panel .badge { animation: slideUpFade 0.5s var(--ease-bounce) forwards; }
        .slide.active h1 { animation: slideUpFade 0.5s var(--ease-bounce) 0.05s forwards; }
        .slide.active .glass-card { animation: slideUpFade 0.5s var(--ease-bounce) 0.1s forwards; }
        .slide.active .hero-wrap { animation: slideRightFade 0.5s var(--ease-bounce) 0.05s forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideRightFade {
            from { opacity: 0; transform: translateX(40px) rotateY(10deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        @media (max-width: 900px) {
            .slide { grid-template-columns: 1fr; text-align: center; gap: 1rem; }
            h1 { font-size: 2.5rem; }
            .hero-visual { font-size: 6rem; }
            .hero-ring, .hero-ring-2 { width: 180px; height: 180px; }
            .slider-container { height: auto; min-height: 550px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="progress-line" id="bar"></div>
    <div class="bg-noise"></div>
    <div class="orb-master" id="orb"></div>

    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <nav class="nav-ui">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="slide-counter" id="counter">01</div>
        <button class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        // ======================= 11 SLIDES (ÚLTIMO SUBSTITUÍDO) =======================
        const slidesData = [
            { title: "Organizações Políticas", icon: "fa-landmark", color: "#1e3a8a", badge: "Fundamentos",
              content: `<p><strong>O que são?</strong> Organizações políticas são estruturas formais ou informais que regulam o poder, tomada de decisões e convivência social. Elas definem quem governa, como as leis são criadas e como os conflitos são resolvidos.</p>
              <p style="margin-top: 1rem;"><strong>Objetivo central:</strong> Compreender a evolução dos sistemas políticos, desde as primeiras assembleias gregas até as democracias digitais do século XXI. Vamos explorar poderes, regimes e mecanismos de participação.</p>
              <p style="margin-top: 1rem;">🗳️ <em>“A política é a arte de fazer o possível” – Maquiavel</em></p>`,
              meta: "Ciência Política • Governança" },
            { title: "Democracia Ateniense", icon: "fa-university", color: "#0e7b6e", badge: "Séc. V a.C.",
              content: `<p><strong>Berço da democracia ocidental</strong> – Atenas (c. 508 a.C.) introduziu o conceito de <em>isonomia</em> (igualdade perante a lei) e <em>isegoria</em> (direito de falar na assembleia).</p>
              <ul class="timeline-list"><li><i class="fas fa-users"></i> <strong>Eclésia</strong> – Assembleia de cidadãos votava diretamente as leis.</li>
              <li><i class="fas fa-dice-d6"></i> <strong>Sortição</strong> – Maioria dos cargos por sorteio, evitando corrupção.</li>
              <li><i class="fas fa-gavel"></i> <strong>Boulé</strong> – Conselho de 500 cidadãos preparava a agenda.</li></ul>
              <p><strong>Limitações:</strong> Mulheres, escravos e estrangeiros excluídos. Marco radical de participação direta.</p>`,
              meta: "Participação direta • Sorteio" },
            { title: "República Romana", icon: "fa-building", color: "#b91c1c", badge: "Res Publica",
              content: `<p><strong>Modelo misto</strong> – Roma (509 a.C. – 27 a.C.) combinou elementos monárquicos, aristocráticos e democráticos. Criou o conceito de <em>res publica</em> (coisa pública).</p>
              <ul class="timeline-list"><li><i class="fas fa-crown"></i> <strong>Cônsules</strong> – Dois líderes executivos com veto mútuo.</li>
              <li><i class="fas fa-church"></i> <strong>Senado</strong> – Elite patrícia que controlava finanças e política externa.</li>
              <li><i class="fas fa-users-between"></i> <strong>Assembleias Tribadas</strong> – Plebeus elegiam tribunos da plebe com poder de veto.</li></ul>
              <p>➡️ Influenciou a separação de poderes moderna e o republicanismo.</p>`,
              meta: "Freios e contrapesos • Cidadania" },
            { title: "Monarquias Absolutistas", icon: "fa-crown", color: "#d97706", badge: "Séc. XVII",
              content: `<p><strong>Concentração de poder no soberano</strong> – Exemplo clássico: Luís XIV de França (“O Estado sou eu”). O rei detinha poderes legislativo, executivo e judiciário sem controle.</p>
              <ul class="timeline-list"><li><i class="fas fa-chess-king"></i> <strong>Direito divino</strong> – Monarca considerado representante de Deus.</li>
              <li><i class="fas fa-coins"></i> <strong>Centralização fiscal</strong> – Impostos controlados pela coroa, exército permanente.</li>
              <li><i class="fas fa-building"></i> <strong>Versalhes</strong> – Símbolo do poder absoluto.</li></ul>
              <p>Críticas iluministas abriram caminho para revoluções liberais.</p>`,
              meta: "Absolutismo • Direito divino" },
            { title: "Revoluções Liberais", icon: "fa-flag-usa", color: "#2563eb", badge: "Séc. XVIII-XIX",
              content: `<p><strong>Independência dos EUA (1776)</strong> e <strong>Revolução Francesa (1789)</strong> romperam com o absolutismo, consagrando direitos individuais e constituições escritas.</p>
              <ul class="timeline-list"><li><i class="fas fa-file-contract"></i> <strong>Constituição dos EUA (1787)</strong> – Separação de poderes.</li>
              <li><i class="fas fa-fist-raised"></i> <strong>Declaração dos Direitos do Homem</strong> – Igualdade, liberdade, propriedade.</li>
              <li><i class="fas fa-chart-line"></i> <strong>Constitucionalismo</strong> – Limitação do poder estatal pela lei.</li></ul>
              <p>➡️ Nascem as primeiras democracias representativas modernas.</p>`,
              meta: "Direitos civis • Separação de poderes" },
            { title: "Democracias do Séc. XX", icon: "fa-vote-yea", color: "#0e7b6e", badge: "Expansão do voto",
              content: `<p><strong>Sufrágio universal, partidos de massa, welfare state.</strong> Após a Segunda Guerra, democracias se consolidaram na Europa Ocidental e se expandiram.</p>
              <ul class="timeline-list"><li><i class="fas fa-female"></i> <strong>Voto feminino</strong> – Nova Zelândia (1893), Brasil (1932).</li>
              <li><i class="fas fa-landmark"></i> <strong>Estado de bem-estar social</strong> – Saúde, educação, previdência.</li>
              <li><i class="fas fa-chalkboard-user"></i> <strong>Democracia representativa</strong> – Eleições periódicas, liberdade de imprensa.</li></ul>
              <p>Desafios: autoritarismos, mas tendência de expansão democrática.</p>`,
              meta: "Sufrágio universal • Welfare state" },
            { title: "Modelos Contemporâneos", icon: "fa-globe", color: "#7c3aed", badge: "Presidencialismo x Parlamentarismo",
              content: `<p><strong>Presidencialismo</strong> (EUA, Brasil): Presidente é chefe de Estado e governo, eleito pelo povo, mandato fixo.</p>
              <p><strong>Parlamentarismo</strong> (Reino Unido, Alemanha): Primeiro-ministro escolhido pelo parlamento, pode ser destituído.</p>
              <p><strong>Semipresidencialismo</strong> (França, Portugal): Presidente eleito e primeiro-ministro responsável perante o parlamento.</p>
              <p>📌 Tendências atuais: democracia digital, orçamento participativo.</p>`,
              meta: "Sistemas de governo • Atualidades" },
            { title: "Simulação de Governo", icon: "fa-gavel", color: "#b45309", badge: "Atividade prática",
              content: `<p><strong>Divida a turma em três poderes:</strong></p>
              <ul class="timeline-list"><li><i class="fas fa-building"></i> <strong>Executivo</strong> – Propõe políticas, administra orçamento.</li>
              <li><i class="fas fa-file-signature"></i> <strong>Legislativo</strong> – Debate e aprova leis.</li>
              <li><i class="fas fa-balance-scale"></i> <strong>Judiciário</strong> – Garante constitucionalidade.</li></ul>
              <p><strong>🎭 Simule a criação de uma lei:</strong> “Lei do Aprendiz Digital” – O Legislativo redige, o Executivo sanciona ou veta, o Judiciário fiscaliza. Vivencie <em>checks and balances</em>.</p>`,
              meta: "Freios e contrapesos • Aprendizagem ativa" },
            { title: "Comparação de Sistemas", icon: "fa-chart-simple", color: "#0ea5e9", badge: "Democracia • Monarquia • Ditadura",
              content: `<p>Três modelos políticos distintos aplicados em países reais:</p>
              <div class="regime-compare">
                <div class="regime-card" style="border-left-color: #2ecc71;"><h3><i class="fas fa-vote-yea" style="color:#2ecc71"></i> Democracia – Brasil</h3><p>República Federativa, eleições livres, poderes independentes, liberdade de imprensa, direitos fundamentais garantidos pela Constituição de 1988. Alternância de poder regular.</p><small>➜ Soberania popular, participação cidadã.</small></div>
                <div class="regime-card" style="border-left-color: #f39c12;"><h3><i class="fas fa-crown" style="color:#f39c12"></i> Monarquia Constitucional – Reino Unido</h3><p>Rei Carlos III é chefe de Estado cerimonial. Governo liderado pelo Primeiro-Ministro eleito pelo parlamento. Democracia parlamentar consolidada.</p><small>➜ Símbolo histórico e governo eleito.</small></div>
                <div class="regime-card" style="border-left-color: #e74c3c;"><h3><i class="fas fa-skull" style="color:#e74c3c"></i> Ditadura – Coreia do Norte</h3><p>Partido único, liderança hereditária, sem eleições livres, controle total da mídia, culto à personalidade, violação de direitos humanos.</p><small>➜ Concentração de poder, ausência de prestação de contas.</small></div>
              </div>
              <p style="margin-top:0.8rem;"><strong>Conclusão:</strong> A organização do poder impacta diretamente a liberdade e o desenvolvimento.</p>`,
              meta: "Exemplos reais • Análise comparativa" },
            { title: "Linha do Tempo Evolutiva", icon: "fa-timeline", color: "#c2410c", badge: "Atenas → Atualidade",
              content: `<ul class="timeline-list"><li><i class="fas fa-landmark"></i> <strong>508 a.C.</strong> – Democracia Ateniense</li>
              <li><i class="fas fa-building"></i> <strong>509 a.C.</strong> – República Romana</li>
              <li><i class="fas fa-crown"></i> <strong>476-1453</strong> – Feudalismo e monarquias medievais</li>
              <li><i class="fas fa-crown"></i> <strong>Séc. XVII</strong> – Absolutismo (Luís XIV)</li>
              <li><i class="fas fa-flag-usa"></i> <strong>1776/1789</strong> – Revoluções Americana e Francesa</li>
              <li><i class="fas fa-chart-line"></i> <strong>Séc. XIX</strong> – Expansão do sufrágio, partidos de massa</li>
              <li><i class="fas fa-fist-raised"></i> <strong>1917</strong> – Revolução Russa</li>
              <li><i class="fas fa-globe"></i> <strong>1945</strong> – ONU, Declaração Universal dos Direitos Humanos</li>
              <li><i class="fas fa-laptop-code"></i> <strong>Séc. XXI</strong> – Democracia digital, governança eletrônica</li></ul>
              <p>➡️ Evolução da exclusão para a universalização, tensões entre autoritarismo e liberdade.</p>`,
              meta: "Marcos históricos • Transformações" },
            { // 11 - NOVO SLIDE FINAL (SUBSTITUÍDO)
              title: "Liberdade", icon: "fa-dove", color: "#a855f7", badge: "Reflexão Final",
              content: `<p style="font-size: 1.8rem; font-weight: bold; margin-bottom: 1.5rem;">Como diz o ditado:</p>
              <p style="font-size: 1.6rem; font-style: italic; margin-bottom: 1.5rem;">"Melhor um término agora do que um trauma para o resto da vida."</p>
              <p style="font-size: 1.3rem;">Estão liberados.</p>
              <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.1);">
                <p><i class="fas fa-heart" style="color: #e74c3c;"></i> Obrigado pela atenção e por refletir sobre organização política conosco.</p>
              </div>`,
              meta: "Fim • Até a próxima!" }
        ];

        let currentIdx = 0;
        const slider = document.getElementById('slider');
        const orb = document.getElementById('orb');
        const bar = document.getElementById('bar');
        const counter = document.getElementById('counter');
        const cursor = document.getElementById('cursor');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        slider.innerHTML = '';
        slidesData.forEach((s, i) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = `slide ${i === 0 ? 'active' : ''}`;
            slideDiv.innerHTML = `
                <div class="info-panel">
                    <div class="badge"><i class="fas ${s.badge === 'Fundamentos' ? 'fa-book-open' : (s.badge === 'Reflexão Final' ? 'fa-feather-alt' : 'fa-tag')}"></i> ${s.badge}</div>
                    <h1>${s.title}</h1>
                    <div class="glass-card" data-card style="border-left: 4px solid ${s.color}">
                        <div class="card-content">${s.content}</div>
                        <div class="card-meta" style="margin-top:1rem; font-size:0.75rem; color:${s.color};"><i class="fas fa-hashtag"></i> ${s.meta}</div>
                    </div>
                </div>
                <div class="hero-wrap">
                    <div class="hero-ring"></div>
                    <div class="hero-ring-2"></div>
                    <i class="fa-solid ${s.icon} hero-visual" style="color:${s.color};"></i>
                </div>
            `;
            slider.appendChild(slideDiv);
        });

        const slides = document.querySelectorAll('.slide');

        function updateUI() {
            const curr = slidesData[currentIdx];
            document.documentElement.style.setProperty('--primary', curr.color);
            document.documentElement.style.setProperty('--primary-light', curr.color + 'cc');
            orb.style.background = `radial-gradient(circle, ${curr.color}20 0%, transparent 80%)`;
            bar.style.width = `${((currentIdx + 1) / slidesData.length) * 100}%`;
            counter.innerText = (currentIdx + 1).toString().padStart(2, '0');
        }

        function moveSlide(delta) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + delta + slidesData.length) % slidesData.length;
            slides[currentIdx].classList.add('active');
            updateUI();
            const btn = delta > 0 ? nextBtn : prevBtn;
            btn.style.transform = 'scale(1.15)';
            setTimeout(() => btn.style.transform = '', 150);
        }

        prevBtn.addEventListener('click', () => moveSlide(-1));
        nextBtn.addEventListener('click', () => moveSlide(1));

        // ========== ANIMAÇÃO 3D DOS CARDS (PARALLAX) ==========
        let mouseX = 0, mouseY = 0;
        function updateCursorPosition() {
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            requestAnimationFrame(updateCursorPosition);
        }
        updateCursorPosition();

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            orb.style.left = (mouseX - 300) + 'px';
            orb.style.top = (mouseY - 300) + 'px';
            
            const rotX = (window.innerHeight / 2 - mouseY) / 70;
            const rotY = (window.innerWidth / 2 - mouseX) / 70;
            const sliderContainer = document.querySelector('.slider-container');
            if (sliderContainer) sliderContainer.style.transform = `rotateX(${rotX}deg) rotateY(${-rotY}deg)`;
        });

        // Efeito 3D individual nos cards (a pedido do usuário)
        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(1000px) rotateX(${y * 8}deg) rotateY(${x * 8}deg) translateY(-6px) translateZ(15px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });

        document.querySelectorAll('.nav-btn, .glass-card, .regime-card, .nav-ui').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveSlide(1);
            if (e.key === 'ArrowLeft') moveSlide(-1);
        });

        updateUI();
    </script>
</body>
</html>
