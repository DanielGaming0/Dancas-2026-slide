<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Estrutura Social · Sociedade Mineradora</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --primary: #A66B00;          /* Ouro envelhecido */
            --primary-light: #D4A017;
            --primary-dark: #5C3A00;
            --accent-gold: #F5C542;
            --bg: #1E1A16;
            --bg-gradient: radial-gradient(circle at 30% 20%, #2F281E 0%, #1A1511 100%);
            --card-bg: rgba(30, 25, 20, 0.75);
            --card-bg-solid: rgba(30, 25, 20, 0.9);
            --border-color: rgba(166, 107, 0, 0.25);
            --text-light: #F3E9D2;
            --text-muted: #C9B89E;
            --glow: rgba(245, 197, 66, 0.25);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-elastic: cubic-bezier(0.5, 1.8, 0.8, 1.2);
            --transition-slow: 0.9s var(--ease-smooth);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 1800px;
            will-change: transform;
        }

        /* Cursor dourado personalizado */
        #cursor {
            width: 34px;
            height: 34px;
            border: 2.5px solid var(--accent-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
            will-change: left, top;
            background: transparent;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 18px var(--glow);
        }
        #cursor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.2s, box-shadow 0.2s;
        }
        #cursor.active {
            width: 52px;
            height: 52px;
            border-color: #FFD966;
            background: rgba(245, 197, 66, 0.12);
            box-shadow: 0 0 30px #FFD96680;
        }
        #cursor.active::before {
            background: #FFD966;
            box-shadow: 0 0 20px #FFD966;
        }

        /* Fundo com textura de pedra / ouro */
        .bg-noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }
        .bg-noise::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, rgba(212,160,23,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .orb-master {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.7;
            transition: background 0.5s ease;
            will-change: left, top;
        }

        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            width: 92%;
            max-width: 1400px;
            height: 750px;
            position: relative;
            transition: transform 0.06s linear;
            will-change: transform;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            align-items: center;
            gap: 2.5rem;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-500px) rotateY(20deg) scale(0.92);
            transition: opacity 0.8s var(--ease-smooth), visibility 0.8s, transform 0.9s var(--ease-bounce);
            filter: blur(10px);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateY(0deg) scale(1);
            filter: blur(0);
        }

        .info-panel {
            padding: 2rem 0 2rem 2rem;
            animation: panelReveal 0.9s var(--ease-bounce);
        }

        @keyframes panelReveal {
            0% { opacity: 0; transform: translateX(-80px) rotateY(-20deg); }
            100% { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 24px;
            background: rgba(166, 107, 0, 0.15);
            border: 1px solid rgba(245, 197, 66, 0.3);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 2.2rem;
            backdrop-filter: blur(6px);
            animation: badgeGlow 3s infinite alternate;
            box-shadow: 0 0 8px rgba(245,197,66,0.1);
        }

        @keyframes badgeGlow {
            0% { box-shadow: 0 0 0 0 rgba(245,197,66,0); border-color: rgba(245,197,66,0.2); }
            100% { box-shadow: 0 0 12px 2px rgba(245,197,66,0.3); border-color: rgba(245,197,66,0.6); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, #F5E3B6 0%, #F5C542 60%, #FFE68F 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: floatTitle 4s ease-in-out infinite;
            text-shadow: 0 0 15px rgba(245,197,66,0.2);
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-7px); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 2.2rem 2rem;
            transition: all 0.5s var(--ease-elastic);
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,197,66,0.05) inset;
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 80%);
            pointer-events: none;
        }

        .glass-card:hover {
            transform: translateY(-10px) translateZ(30px) scale(1.02);
            box-shadow: 0 35px 55px -20px #00000080, 0 0 0 2px var(--accent-gold) inset;
            border-color: var(--accent-gold);
        }

        .card-content {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
        }
        .card-content::-webkit-scrollbar { width: 5px; }
        .card-content::-webkit-scrollbar-track { background: rgba(166,107,0,0.1); border-radius: 10px; }
        .card-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .feature-list {
            list-style: none;
        }
        .feature-list li {
            margin-bottom: 1.2rem;
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
            transition: transform 0.2s;
        }
        .feature-list li:hover {
            transform: translateX(6px);
        }
        .feature-list i {
            width: 32px;
            color: var(--accent-gold);
            font-size: 1.4rem;
            margin-top: 3px;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 1.8rem 0;
        }
        .badge-list span {
            background: rgba(166,107,0,0.2);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #F5E3B6;
            font-size: 0.9rem;
        }

        .hero-wrap {
            position: relative;
            height: 100%;
            display: grid;
            place-items: center;
            perspective: 800px;
        }

        .hero-visual {
            font-size: 12rem;
            color: var(--accent-gold);
            filter: drop-shadow(0 15px 25px #00000060) drop-shadow(0 0 30px #D4A01740);
            transition: transform 0.4s;
            animation: gentleFloat 5.5s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .hero-ring {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 2.5px dashed var(--primary-light);
            border-radius: 50%;
            opacity: 0.2;
            animation: spin 25s linear infinite;
        }
        .hero-ring-2 {
            position: absolute;
            width: 480px;
            height: 480px;
            border: 1.8px solid rgba(245,197,66,0.25);
            border-radius: 50%;
            animation: spinReverse 32s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .nav-ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 12px 36px;
            background: rgba(20, 16, 12, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 197, 66, 0.2);
            border-radius: 80px;
            z-index: 1000;
            box-shadow: 0 15px 35px -10px #00000080, 0 0 0 1px rgba(212,160,23,0.1);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent-gold);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s var(--ease-bounce);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }
        .nav-btn:hover { 
            transform: scale(1.3); 
            color: #FFE68F; 
            text-shadow: 0 0 25px #FFD966;
            background: rgba(245,197,66,0.08);
        }

        .slide-counter {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--accent-gold);
            letter-spacing: 6px;
            text-shadow: 0 0 10px #F5C542;
        }

        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #A66B00, #F5C542, #FFD966);
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2000;
            box-shadow: 0 0 18px #F5C542;
        }

        /* Animações de entrada suaves */
        .slide.active .info-panel .badge { animation: slideUpFade 0.65s var(--ease-bounce) forwards; }
        .slide.active h1 { animation: slideUpFade 0.65s var(--ease-bounce) 0.08s forwards; }
        .slide.active .glass-card { animation: slideUpFade 0.65s var(--ease-bounce) 0.14s forwards; }
        .slide.active .hero-wrap { animation: slideRightFade 0.65s var(--ease-bounce) 0.08s forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(45px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideRightFade {
            from { opacity: 0; transform: translateX(60px) rotateY(12deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        @media (max-width: 950px) {
            .slide { grid-template-columns: 1fr; }
            h1 { font-size: 2.4rem; }
            .hero-visual { font-size: 7rem; }
            .slider-container { height: auto; min-height: 650px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="progress-line" id="bar"></div>
    <div class="bg-noise"></div>
    <div class="orb-master" id="orb"></div>

    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <nav class="nav-ui">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="slide-counter" id="counter">01</div>
        <button class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        (function(){
            "use strict";

            // ========== DADOS DOS SLIDES – SOCIEDADE MINERADORA ==========
            const slidesData = [
                {   // slide 0 - Título
                    title: "⛏️ Estrutura Social", 
                    subtitle: "Sociedade Mineradora",
                    icon: "fa-gem", 
                    color: "#A66B00", 
                    badge: "Brasil Colonial · Século XVIII",
                    content: `<p style="font-size:1.2rem; color: #F3E9D2;"><strong>A mineração transformou a colônia</strong>, criando uma sociedade complexa e hierarquizada.</p>
                    <div class="badge-list">
                        <span><i class="fas fa-users"></i> Elite mineradora</span>
                        <span><i class="fas fa-hammer"></i> Homens livres</span>
                        <span><i class="fas fa-chain"></i> Escravizados</span>
                    </div>
                    <p>A descoberta do ouro em Minas Gerais deu origem a uma nova dinâmica social, com grande mobilidade e contrastes extremos.</p>
                    <p style="margin-top:1.5rem; border-left:4px solid var(--accent-gold); padding-left:1.2rem; font-style:italic;">“O ouro mudou a face da colônia e as relações de poder.”</p>`,
                    meta: "Hierarquia · Riqueza · Exploração"
                },
                {   // slide 1 - Classes Sociais
                    title: "📊 Classes Sociais", 
                    icon: "fa-layer-group", 
                    color: "#B87C1B", 
                    badge: "Pirâmide social",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-crown"></i> <strong>Elite</strong> – Grandes mineradores, comerciantes abastados, altos funcionários.</li>
                        <li><i class="fas fa-user"></i> <strong>Homens livres</strong> – Trabalhadores, artesãos, pequenos comerciantes, tropeiros.</li>
                        <li><i class="fas fa-fist-raised"></i> <strong>Escravizados</strong> – Base da mão de obra nas minas e lavras.</li>
                    </ul>
                    <p style="margin-top:1.8rem;"><i class="fas fa-chart-line"></i> A riqueza do ouro acentuou as diferenças, mas também abriu brechas para ascensão.</p>`,
                    meta: "Estratificação · Minas Gerais"
                },
                {   // slide 2 - Elite
                    title: "👑 Elite", 
                    icon: "fa-crown", 
                    color: "#9E6B1A", 
                    badge: "Poder & Riqueza",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-coins"></i> <strong>Mais ricos e poderosos</strong> da região.</li>
                        <li><i class="fas fa-mountain"></i> <strong>Donos das minas</strong> (datas) e do grande comércio.</li>
                        <li><i class="fas fa-landmark"></i> <strong>Grande influência social e política</strong> – controlavam câmaras e irmandades.</li>
                    </ul>
                    <p>Viviam em sobrados, vestiam-se com luxo e ditavam as regras da sociedade mineradora.</p>
                    <div style="margin-top:1.8rem; background:rgba(166,107,0,0.15); padding:0.8rem 1.2rem; border-radius:30px;">
                        <i class="fas fa-gem"></i> <strong>Exemplo:</strong> contratadores de diamantes, grandes negociantes de escravos.
                    </div>`,
                    meta: "Oligarquia · Mecenato"
                },
                {   // slide 3 - Homens Livres
                    title: "🛠️ Homens Livres", 
                    icon: "fa-hammer", 
                    color: "#C48A2C", 
                    badge: "Trabalho & Sobrevivência",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-tools"></i> <strong>Trabalhadores, artesãos, pequenos comerciantes.</strong></li>
                        <li><i class="fas fa-home"></i> <strong>Vida simples</strong>, moradias modestas.</li>
                        <li><i class="fas fa-hand-holding-usd"></i> <strong>Dependiam economicamente da elite</strong> – prestação de serviços, comércio miúdo.</li>
                    </ul>
                    <p>Eram a camada intermediária, alguns conseguiam juntar recursos e até adquirir um ou dois escravos.</p>
                    <p><i class="fas fa-balance-scale"></i> Representavam a possibilidade de mobilidade, embora limitada.</p>`,
                    meta: "Faiscadores · Ofícios"
                },
                {   // slide 4 - Escravizados
                    title: "⛓️ Escravizados", 
                    icon: "fa-chain-broken", 
                    color: "#7A4F0E", 
                    badge: "Base da mineração",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-hard-hat"></i> <strong>Base do trabalho na mineração</strong> – extração, transporte, faiscação.</li>
                        <li><i class="fas fa-temperature-low"></i> <strong>Condições de vida muito difíceis</strong> – jornadas exaustivas, doenças, alimentação precária.</li>
                        <li><i class="fas fa-skull"></i> <strong>Sofriam exploração intensa</strong> e violência.</li>
                    </ul>
                    <p>Representavam a maioria da população nas áreas de mineração. Apesar da opressão, resistiam e construíam laços culturais.</p>
                    <p style="margin-top:1.2rem;"><i class="fas fa-dove"></i> Alguns conseguiam comprar a alforria (cartas de liberdade).</p>`,
                    meta: "Resistência · Alforria"
                },
                {   // slide 5 - Mobilidade Social
                    title: "📈 Mobilidade Social", 
                    icon: "fa-arrow-trend-up", 
                    color: "#D4A017", 
                    badge: "Ascensão possível",
                    content: `<p><i class="fas fa-gold"></i> A sociedade mineradora era mais <strong>flexível</strong> que a açucareira.</p>
                    <ul class="feature-list" style="margin-top:1.2rem;">
                        <li><i class="fas fa-handcuffs"></i> <strong>Alguns escravizados compravam a liberdade</strong> (ou a recebiam).</li>
                        <li><i class="fas fa-user-plus"></i> <strong>Homens livres podiam enriquecer</strong> com o comércio ou achado de ouro.</li>
                        <li><i class="fas fa-chart-bar"></i> Forros (ex-escravos) podiam se tornar pequenos mineradores.</li>
                    </ul>
                    <div style="margin-top:2rem; padding:1rem; background:rgba(212,160,23,0.1); border-radius:20px;">
                        ⚡ <strong>Exemplo:</strong> Chica da Silva – ex-escrava que ascendeu socialmente.
                    </div>`,
                    meta: "Alforria · Fortuna"
                },
                {   // slide 6 - Vida nas Cidades
                    title: "🏙️ Vida nas Cidades Mineradoras", 
                    icon: "fa-city", 
                    color: "#B8860B", 
                    badge: "Urbano & Contrastes",
                    content: `<ul class="feature-list">
                        <li><i class="fas fa-arrow-up"></i> <strong>Crescimento rápido e desorganizado</strong> – vilas que viravam cidades.</li>
                        <li><i class="fas fa-store"></i> <strong>Muito comércio e circulação de pessoas</strong> – tropas, mercadores, aventureiros.</li>
                        <li><i class="fas fa-music"></i> <strong>Festas e atividades culturais</strong> – barroco mineiro, congadas, irmandades.</li>
                        <li><i class="fas fa-cloud-rain"></i> <strong>Condições difíceis para a maioria</strong> – falta de saneamento, carestia.</li>
                    </ul>
                    <p>Vila Rica (Ouro Preto), Mariana, Sabará: centros de poder, fé e arte.</p>`,
                    meta: "Ouro Preto · Barroco"
                }
            ];

            // ---------- Configuração do slider ----------
            let currentIdx = 0;
            const slider = document.getElementById('slider');
            const orb = document.getElementById('orb');
            const bar = document.getElementById('bar');
            const counter = document.getElementById('counter');
            const cursor = document.getElementById('cursor');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            // Monta slides no DOM
            slider.innerHTML = '';
            slidesData.forEach((s, i) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${i === 0 ? 'active' : ''}`;
                slideDiv.innerHTML = `
                    <div class="info-panel">
                        <div class="badge"><i class="fas ${i === 0 ? 'fa-scroll' : 'fa-tag'}"></i> ${s.badge}</div>
                        <h1>${s.title}</h1>
                        <div class="glass-card" data-card style="border-left: 6px solid ${s.color}">
                            <div class="card-content">${s.content}</div>
                            <div class="card-meta" style="margin-top:1.6rem; font-size:0.85rem; font-weight:500; color:${s.color}; letter-spacing:0.8px; display:flex; gap:10px;">
                                <i class="fa-regular fa-compass"></i> ${s.meta}
                            </div>
                        </div>
                    </div>
                    <div class="hero-wrap">
                        <div class="hero-ring"></div>
                        <div class="hero-ring-2"></div>
                        <i class="fa-solid ${s.icon} hero-visual" style="color:${s.color}; text-shadow:0 0 30px ${s.color}80;"></i>
                    </div>
                `;
                slider.appendChild(slideDiv);
            });

            const slides = document.querySelectorAll('.slide');

            function updateUI() {
                const curr = slidesData[currentIdx];
                document.documentElement.style.setProperty('--primary', curr.color);
                document.documentElement.style.setProperty('--primary-light', curr.color + 'dd');
                orb.style.background = `radial-gradient(circle, ${curr.color}40 0%, transparent 80%)`;
                bar.style.width = `${((currentIdx + 1) / slidesData.length) * 100}%`;
                counter.innerText = (currentIdx + 1).toString().padStart(2, '0');
            }

            function moveSlide(delta) {
                slides[currentIdx].classList.remove('active');
                currentIdx = (currentIdx + delta + slidesData.length) % slidesData.length;
                slides[currentIdx].classList.add('active');
                updateUI();
                const btn = delta > 0 ? nextBtn : prevBtn;
                btn.style.transform = 'scale(1.25)';
                setTimeout(() => btn.style.transform = '', 180);
            }

            prevBtn.addEventListener('click', () => moveSlide(-1));
            nextBtn.addEventListener('click', () => moveSlide(1));

            // ========== CURSOR + PARALLAXE 3D SUAVE ==========
            let mouseX = 0, mouseY = 0;
            function updateCursorPosition() {
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                requestAnimationFrame(updateCursorPosition);
            }
            updateCursorPosition();

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                orb.style.left = (mouseX - 400) + 'px';
                orb.style.top = (mouseY - 400) + 'px';
                
                const rotX = (window.innerHeight / 2 - mouseY) / 90;
                const rotY = (window.innerWidth / 2 - mouseX) / 90;
                const sliderContainer = document.querySelector('.slider-container');
                if (sliderContainer) sliderContainer.style.transform = `rotateX(${rotX}deg) rotateY(${-rotY}deg)`;
            });

            // Efeito 3D fluido nos cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    card.style.transform = `perspective(1400px) rotateX(${y * 8}deg) rotateY(${x * 8}deg) translateY(-8px) translateZ(28px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                });
            });

            // Ativar cursor personalizado
            document.querySelectorAll('.nav-btn, .glass-card, .badge-list span, .nav-ui, .badge').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });

            // Navegação por teclado
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') moveSlide(1);
                if (e.key === 'ArrowLeft') moveSlide(-1);
            });

            // Efeito de clique suave nos itens da lista
            document.querySelectorAll('.feature-list li, .badge-list span').forEach(el => {
                el.addEventListener('click', () => {
                    el.style.transform = 'scale(0.97)';
                    setTimeout(() => el.style.transform = '', 120);
                });
            });

            // Inicializa UI
            updateUI();

        })();
    </script>
</body>
</html>
