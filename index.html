<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Organizações Políticas | Sistemas de Governo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-glow: rgba(30, 58, 138, 0.2);
            --bg: #f8fafc;
            --bg-gradient: radial-gradient(circle at 20% 30%, #f1f5f9 0%, #ffffff 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-bg-solid: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-dark: #0f172a;
            --text-muted: #334155;
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 1500px;
            will-change: transform;
        }

        /* Cursor elegante */
        #cursor {
            width: 28px;
            height: 28px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
            will-change: left, top;
            background: transparent;
            backdrop-filter: blur(2px);
        }
        #cursor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: background 0.2s;
        }
        #cursor.active {
            width: 44px;
            height: 44px;
            border-color: var(--primary-light);
            background: rgba(59, 130, 246, 0.08);
        }
        #cursor.active::before {
            background: var(--primary-light);
            box-shadow: 0 0 8px var(--primary-light);
        }

        /* Fundo limpo */
        .bg-noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .orb-master {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
            transition: background 0.4s ease;
            will-change: left, top;
        }

        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            width: 90%;
            max-width: 1300px;
            height: 700px;
            position: relative;
            transition: transform 0.08s linear;
            will-change: transform;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-400px) rotateY(25deg) scale(0.95);
            transition: opacity 0.6s var(--ease-smooth), visibility 0.6s, transform 0.7s var(--ease-bounce);
            filter: blur(6px);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateY(0deg) scale(1);
            filter: blur(0);
        }

        .info-panel {
            padding: 2rem;
            animation: panelReveal 0.7s var(--ease-bounce);
        }

        @keyframes panelReveal {
            0% { opacity: 0; transform: translateX(-60px) rotateY(-15deg); }
            100% { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 18px;
            background: rgba(30, 58, 138, 0.08);
            border: 1px solid rgba(30, 58, 138, 0.2);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1.8rem;
            backdrop-filter: blur(2px);
            animation: badgePulse 2s infinite ease-in-out;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(30, 58, 138, 0); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 1.8rem;
            transition: all 0.4s var(--ease-elastic);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.05);
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 0.6;
        }

        .glass-card:hover {
            transform: translateY(-6px) translateZ(20px) scale(1.01);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-light);
        }

        .card-content {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            max-height: 470px;
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
        }
        .card-content::-webkit-scrollbar { width: 3px; }
        .card-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
        .card-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .timeline-list, .compare-list {
            list-style: none;
            padding-left: 0;
        }
        .timeline-list li, .compare-list li {
            margin-bottom: 0.9rem;
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
        }
        .timeline-list i, .compare-list i {
            width: 26px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            overflow: hidden;
        }
        .comparison-table th, .comparison-table td {
            border: 1px solid rgba(0,0,0,0.08);
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }
        .comparison-table th {
            background: rgba(30, 58, 138, 0.08);
            color: var(--primary);
            font-weight: 700;
        }

        .regime-compare {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        .regime-card {
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            padding: 0.9rem;
            border-left: 4px solid;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .regime-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .hero-wrap {
            position: relative;
            height: 100%;
            display: grid;
            place-items: center;
            perspective: 600px;
        }

        .hero-visual {
            font-size: 10rem;
            color: var(--primary);
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
            animation: gentleFloat 4s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .hero-ring {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 1.5px dashed var(--primary-light);
            border-radius: 50%;
            opacity: 0.2;
            animation: spin 20s linear infinite;
        }
        .hero-ring-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50%;
            animation: spinReverse 25s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .nav-ui {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 8px 28px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 50px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.6rem;
            cursor: pointer;
            transition: transform 0.2s var(--ease-bounce);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { transform: scale(1.2); color: var(--primary-light); text-shadow: 0 0 8px rgba(59,130,246,0.3); }

        .slide-counter {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 3px;
        }

        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2000;
        }

        .slide.active .info-panel .badge { animation: slideUpFade 0.5s var(--ease-bounce) forwards; }
        .slide.active h1 { animation: slideUpFade 0.5s var(--ease-bounce) 0.05s forwards; }
        .slide.active .glass-card { animation: slideUpFade 0.5s var(--ease-bounce) 0.1s forwards; }
        .slide.active .hero-wrap { animation: slideRightFade 0.5s var(--ease-bounce) 0.05s forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideRightFade {
            from { opacity: 0; transform: translateX(40px) rotateY(10deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        @media (max-width: 900px) {
            .slide { grid-template-columns: 1fr; text-align: center; gap: 1rem; }
            h1 { font-size: 2rem; }
            .hero-visual { font-size: 5rem; }
            .hero-ring, .hero-ring-2 { width: 160px; height: 160px; }
            .slider-container { height: auto; min-height: 550px; }
            .comparison-table { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="progress-line" id="bar"></div>
    <div class="bg-noise"></div>
    <div class="orb-master" id="orb"></div>

    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <nav class="nav-ui">
        <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="slide-counter" id="counter">01</div>
        <button class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        // ======================= CONTEÚDO ATUALIZADO COM 8 SLIDES =======================
        // Inclui o slide de agradecimento final (8º slide) exatamente como solicitado
        const slidesData = [
            { 
                title: "🏛️ Organizações políticas", 
                icon: "fa-landmark", 
                color: "#1e3a8a", 
                badge: "Estrutura do poder",
                content: `<p>As organizações políticas mostram como o poder é estruturado dentro de um país. Elas definem:</p>
                <ul class="timeline-list">
                    <li><i class="fas fa-user-tie"></i> <strong>Quem governa</strong></li>
                    <li><i class="fas fa-check-circle"></i> <strong>Como o governo é escolhido</strong></li>
                    <li><i class="fas fa-gavel"></i> <strong>Como as decisões são tomadas</strong></li>
                </ul>
                <p>Cada país adota um sistema político organizado, que determina o funcionamento do Estado e a relação com a população.</p>
                <p style="margin-top: 1rem; font-style: italic;">🗳️ “A política é a arte de organizar a convivência”.</p>`,
                meta: "Governança • Tomada de decisão"
            },
            { 
                title: "🌍 Sistemas políticos principais", 
                icon: "fa-globe", 
                color: "#0e7b6e", 
                badge: "Visão geral",
                content: `<p>Existem três grandes modelos de organização política no mundo contemporâneo:</p>
                <div class="regime-compare">
                    <div class="regime-card" style="border-left-color: #2ecc71;"><h3><i class="fas fa-vote-yea" style="color:#2ecc71"></i> Democracia</h3><p>Poder vem do povo, eleições livres, participação cidadã.</p></div>
                    <div class="regime-card" style="border-left-color: #f39c12;"><h3><i class="fas fa-crown" style="color:#f39c12"></i> Monarquia</h3><p>Chefe de Estado hereditário (rei/rainha), poderes variam.</p></div>
                    <div class="regime-card" style="border-left-color: #e74c3c;"><h3><i class="fas fa-skull" style="color:#e74c3c"></i> Ditadura</h3><p>Poder concentrado, sem eleições livres, controle rígido.</p></div>
                </div>
                <p>👉 Cada sistema reflete uma forma diferente de relação entre Estado e sociedade.</p>`,
                meta: "Democracia • Monarquia • Ditadura"
            },
            { 
                title: "🗳️ Democracia", 
                icon: "fa-vote-yea", 
                color: "#2ecc71", 
                badge: "Poder do povo",
                content: `<p><strong>Na democracia, o poder vem do povo.</strong></p>
                <ul class="timeline-list">
                    <li><i class="fas fa-check-circle"></i> Governantes são escolhidos por <strong>eleições livres</strong>.</li>
                    <li><i class="fas fa-users"></i> A população pode participar (votar, opinar, protestar).</li>
                    <li><i class="fas fa-comment-dots"></i> Há liberdade de expressão e direitos garantidos.</li>
                </ul>
                <p><strong>Exemplos:</strong> Brasil, Estados Unidos, Alemanha.</p>
                <p>👉 O povo tem participação ativa no governo.</p>
                <p style="margin-top: 0.8rem;"><em>“Democracia é o governo do povo, pelo povo, para o povo.” – Abraham Lincoln</em></p>`,
                meta: "Sufrágio • Liberdade • Participação"
            },
            { 
                title: "👑 Monarquia", 
                icon: "fa-crown", 
                color: "#f39c12", 
                badge: "Tradição e herança",
                content: `<p><strong>Na monarquia, o chefe de Estado é um rei ou rainha.</strong> O poder geralmente é hereditário.</p>
                <p><strong>Pode ser:</strong></p>
                <ul class="timeline-list">
                    <li><i class="fas fa-balance-scale"></i> <strong>Constitucional:</strong> o rei tem poder limitado (há parlamento). Exemplo: <strong>Reino Unido</strong>.</li>
                    <li><i class="fas fa-crown"></i> <strong>Absoluta:</strong> o rei concentra o poder. Exemplo: <strong>Arábia Saudita</strong>.</li>
                </ul>
                <p>👉 O poder está ligado à família real.</p>
                <p>Atualmente, a maioria das monarquias são constitucionais, funcionando como símbolo de unidade nacional.</p>`,
                meta: "Realeza • Hereditariedade"
            },
            { 
                title: "⚠️ Ditadura", 
                icon: "fa-skull", 
                color: "#e74c3c", 
                badge: "Concentração de poder",
                content: `<p><strong>Na ditadura, o poder fica concentrado em uma pessoa ou grupo.</strong></p>
                <ul class="timeline-list">
                    <li><i class="fas fa-ban"></i> Não há eleições livres.</li>
                    <li><i class="fas fa-lock"></i> Direitos e liberdades são limitados.</li>
                    <li><i class="fas fa-tv"></i> O governo controla a população e a mídia.</li>
                </ul>
                <p><strong>Exemplo:</strong> Coreia do Norte, Síria (regimes autoritários).</p>
                <p>👉 A população não participa das decisões e há forte repressão à oposição.</p>
                <p style="margin-top:0.6rem;"><em>“A ditadura é o preço da covardia coletiva.” – pensamento político</em></p>`,
                meta: "Autoritarismo • Censura"
            },
            { 
                title: "⚖️ Comparação entre os sistemas", 
                icon: "fa-chart-simple", 
                color: "#8e44ad", 
                badge: "Análise direta",
                content: `<table class="comparison-table">
                    <thead>
                        <tr><th>Sistema</th><th>Quem governa</th><th>Participação do povo</th><th>Liberdade</th></tr>
                    </thead>
                    <tbody>
                        <tr><td><strong>Democracia</strong></td><td>Representantes eleitos</td><td>Alta</td><td>Alta</td></tr>
                        <tr><td><strong>Monarquia</strong></td><td>Rei/Rainha</td><td>Média (ou baixa)</td><td>Varia</td></tr>
                        <tr><td><strong>Ditadura</strong></td><td>Ditador</td><td>Nenhuma ou mínima</td><td>Baixa</td></tr>
                    </tbody>
                </table>
                <p><strong>📌 Resumo:</strong> A democracia oferece mais espaços de participação; a monarquia mantém tradições com poderes limitados ou absolutos; a ditadura centraliza o poder e restringe liberdades fundamentais.</p>`,
                meta: "Tabela comparativa • Indicadores"
            },
            { 
                title: "🧠 Conclusão", 
                icon: "fa-brain", 
                color: "#16a34a", 
                badge: "Reflexão final",
                content: `<p>Os sistemas políticos mostram diferentes formas de organização do poder.</p>
                <ul class="timeline-list">
                    <li><i class="fas fa-check-circle" style="color:#2ecc71"></i> A <strong>democracia</strong> valoriza a participação popular.</li>
                    <li><i class="fas fa-crown" style="color:#f39c12"></i> A <strong>monarquia</strong> mantém tradições com reis ou rainhas.</li>
                    <li><i class="fas fa-skull" style="color:#e74c3c"></i> A <strong>ditadura</strong> concentra o poder e limita a liberdade.</li>
                </ul>
                <p>Compreender essas estruturas é essencial para exercer a cidadania de forma consciente e ativa. Cada modelo impacta diretamente os direitos, a justiça social e o desenvolvimento de um país.</p>
                <div style="margin-top: 1.5rem; display: flex; gap: 10px; flex-wrap: wrap;">
                    <span style="background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 40px;"><i class="fas fa-landmark"></i> Cidadania crítica</span>
                    <span style="background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 40px;"><i class="fas fa-vote-yea"></i> Seu voto importa</span>
                </div>`,
                meta: "Aprendizado • Engajamento"
            },
            // ========== 8º SLIDE: AGRADECIMENTO FINAL (exatamente como solicitado) ==========
            { 
                title: "Pra Finalizar...", 
                icon: "fa-face-smile-wink", 
                color: "#a855f7", 
                badge: "Obrigado!",
                content: `<p style="font-size: 1.8rem; font-weight: bold; margin-bottom: 1rem;">Espero que tenham gostado.</p>
                <p style="font-size: 1.4rem;">Se não gostaram, a culpa é do algoritmo. 🤖</p>
                <div style="margin-top: 2rem; display: flex; gap: 12px; flex-wrap: wrap;">
                    <span style="background: rgba(0,0,0,0.05); padding: 6px 14px; border-radius: 40px;"><i class="fas fa-hand-peace"></i> Participe da simulação</span>
                    <span style="background: rgba(0,0,0,0.05); padding: 6px 14px; border-radius: 40px;"><i class="fas fa-landmark"></i> Política é construção coletiva</span>
                    <span style="background: rgba(0,0,0,0.05); padding: 6px 14px; border-radius: 40px;"><i class="fas fa-mask"></i> Democracia não é perfeita, mas é melhor que as alternativas</span>
                </div>
                <div style="margin-top: 1.8rem; font-size: 0.8rem; color: #a855f7; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 1rem;"><i class="fas fa-music"></i> Fim • Créditos: inspiração democrática</div>`,
                meta: "Agradecimento • Créditos"
            }
        ];

        let currentIdx = 0;
        const slider = document.getElementById('slider');
        const orb = document.getElementById('orb');
        const bar = document.getElementById('bar');
        const counter = document.getElementById('counter');
        const cursor = document.getElementById('cursor');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Construir slides
        slider.innerHTML = '';
        slidesData.forEach((s, i) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = `slide ${i === 0 ? 'active' : ''}`;
            slideDiv.innerHTML = `
                <div class="info-panel">
                    <div class="badge"><i class="fas ${s.badge.includes('Obrigado') ? 'fa-heart' : (s.badge.includes('Estrutura') ? 'fa-diagram-project' : 'fa-tag')}"></i> ${s.badge}</div>
                    <h1>${s.title}</h1>
                    <div class="glass-card" data-card style="border-left: 4px solid ${s.color}">
                        <div class="card-content">${s.content}</div>
                        <div class="card-meta" style="margin-top:1rem; font-size:0.75rem; color:${s.color};"><i class="fas fa-hashtag"></i> ${s.meta}</div>
                    </div>
                </div>
                <div class="hero-wrap">
                    <div class="hero-ring"></div>
                    <div class="hero-ring-2"></div>
                    <i class="fa-solid ${s.icon} hero-visual" style="color:${s.color};"></i>
                </div>
            `;
            slider.appendChild(slideDiv);
        });

        const slides = document.querySelectorAll('.slide');

        function updateUI() {
            const curr = slidesData[currentIdx];
            document.documentElement.style.setProperty('--primary', curr.color);
            document.documentElement.style.setProperty('--primary-light', curr.color + 'cc');
            orb.style.background = `radial-gradient(circle, ${curr.color}20 0%, transparent 80%)`;
            bar.style.width = `${((currentIdx + 1) / slidesData.length) * 100}%`;
            counter.innerText = (currentIdx + 1).toString().padStart(2, '0');
        }

        function moveSlide(delta) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + delta + slidesData.length) % slidesData.length;
            slides[currentIdx].classList.add('active');
            updateUI();
            const btn = delta > 0 ? nextBtn : prevBtn;
            btn.style.transform = 'scale(1.15)';
            setTimeout(() => btn.style.transform = '', 150);
        }

        prevBtn.addEventListener('click', () => moveSlide(-1));
        nextBtn.addEventListener('click', () => moveSlide(1));

        // ========== CURSOR + PARALAXE 3D NOS CARDS ==========
        let mouseX = 0, mouseY = 0;
        function updateCursorPosition() {
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            requestAnimationFrame(updateCursorPosition);
        }
        updateCursorPosition();

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            orb.style.left = (mouseX - 300) + 'px';
            orb.style.top = (mouseY - 300) + 'px';
            
            const rotX = (window.innerHeight / 2 - mouseY) / 70;
            const rotY = (window.innerWidth / 2 - mouseX) / 70;
            const sliderContainer = document.querySelector('.slider-container');
            if (sliderContainer) sliderContainer.style.transform = `rotateX(${rotX}deg) rotateY(${-rotY}deg)`;
        });

        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(1000px) rotateX(${y * 8}deg) rotateY(${x * 8}deg) translateY(-6px) translateZ(15px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });

        document.querySelectorAll('.nav-btn, .glass-card, .regime-card, .nav-ui').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveSlide(1);
            if (e.key === 'ArrowLeft') moveSlide(-1);
        });

        updateUI();
    </script>
</body>
</html>
